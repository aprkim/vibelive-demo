<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyRoom - Video Chat</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --radius: 16px;
            --max: 980px;
            --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;

            --bg: #F5FAFC;
            --card: #FFFFFF;
            --soft: #F7F5FA;
            --border: #E0E8F0;
            --borderSoft: #DBE2EA;

            --text: #1E293B;
            --muted: #607088;
            --muted2: #9CA3AF;

            --accent: #6E6282;
            --accentHover: #585070;
            --accentSoft: rgba(110,98,130,.12);
            --accentBorder: rgba(110,98,130,.30);

            --liveBg: #E8F4ED;
            --liveBorder: #A6C5A3;
            --liveText: #324252;

            --disabledBg: #F3F4F6;
            --disabledBorder: #E5E7EB;
            --disabledText: #6B7280;

            --dangerBg: #FEF2F2;
            --dangerBorder: #fca5a5;
            --dangerText: #b91c1c;

            --overlay: rgba(30, 41, 59, 0.5);
        }

        [data-theme="dark"] {
            --bg: #13101E;
            --card: #1A1626;
            --soft: #241F32;
            --border: #332D44;
            --borderSoft: #443C58;

            --text: #E5E2EB;
            --muted: #A09BB0;
            --muted2: #6B6580;

            --accent: #9B8CB8;
            --accentHover: #B0A2C8;
            --accentSoft: rgba(155,140,184,.18);
            --accentBorder: rgba(155,140,184,.40);

            --liveBg: rgba(16,185,129,.15);
            --liveBorder: rgba(16,185,129,.4);
            --liveText: #a7f3d0;

            --dangerBg: rgba(239,68,68,.15);
            --dangerBorder: rgba(239,68,68,.4);
            --dangerText: #fca5a5;

            --overlay: rgba(0,0,0,0.6);
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.2s, color 0.2s;
        }

        /* Theme Toggle */
        #themeToggle {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }
        #themeToggle:hover { border-color: var(--accent); }
        #themeToggle svg { width: 18px; height: 18px; }

        /* Topbar */
        .topbar {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .topbar.visible { display: flex; }
        .topbar-left { font-weight: 700; font-size: 15px; color: var(--accent); }
        .topbar-right { display: flex; align-items: center; gap: 8px; }
        .room-code-pill {
            font-family: monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accentSoft);
            border: 1px solid var(--accentBorder);
            padding: 4px 10px;
            border-radius: 8px;
        }
        .topbar-btn {
            background: var(--soft);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s;
        }
        .topbar-btn:hover { border-color: var(--accent); color: var(--text); }
        .copied-tooltip {
            position: absolute;
            top: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: var(--bg);
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .copied-tooltip.show { opacity: 1; }

        /* Entry Screen */
        #entryScreen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            gap: 16px;
        }
        .entry-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            width: 100%;
            max-width: 400px;
        }
        .entry-card label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .entry-card input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--soft);
            color: var(--text);
            font-size: 14px;
            font-family: var(--sans);
            outline: none;
            transition: border-color 0.2s;
        }
        .entry-card input:focus { border-color: var(--accent); }
        .entry-card input::placeholder { color: var(--muted2); }

        .name-hint {
            font-size: 12px;
            color: var(--dangerText);
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.3s;
            height: 18px;
        }
        .name-hint.visible { opacity: 1; }

        .or-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            color: var(--muted2);
            font-size: 12px;
        }
        .or-divider::before, .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .join-row {
            display: flex;
            gap: 8px;
        }
        .join-row input { flex: 1 1 75%; }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            font-family: var(--sans);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover:not(:disabled) { background: var(--accentHover); }
        .btn-secondary {
            background: var(--soft);
            color: var(--text);
            border-color: var(--border);
        }
        .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }
        .btn-danger {
            background: var(--dangerBg);
            color: var(--dangerText);
            border-color: var(--dangerBorder);
        }
        .btn-danger:hover { background: var(--dangerBorder); color: #fff; }

        .btn:disabled { cursor: not-allowed; }
        .btn-full { width: 100%; }
        .join-row .btn { flex: 0 0 25%; }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Pre-Live Screen */
        #preLiveScreen {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .prelive-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            align-self: stretch;
            gap: 16px;
            width: 100%;
            max-width: var(--max);
            margin: 0 auto;
        }
        .preview-container {
            width: min(70%, calc((100vh - 180px) * 16 / 9 * 0.7));
            max-width: 100%;
        }
        .prelive-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .prelive-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        /* Live Screen */
        #liveScreen {
            display: none;
            flex: 1;
            flex-direction: column;
        }
        .live-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            gap: 12px;
            overflow: auto;
            max-width: var(--max);
            width: 100%;
            margin: 0 auto;
        }

        /* Video Grids */
        #screenshareGrid {
            display: flex;
            flex-wrap: nowrap;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }
        #screenshareGrid .video-tile {
            flex: 1 1 0;
            min-width: 0;
            max-width: 100%;
        }
        #cameraGrid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }

        /* Video Tile */
        .video-tile {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--soft);
            border: 1px solid var(--border);
            transition: transform 0.3s, opacity 0.3s;
        }
        .video-tile[data-is-local="true"] { border: 2px solid var(--accentBorder); }

        .video-tile .aspect-spacer {
            display: block;
            padding-top: 56.25%;
        }

        .video-container {
            position: absolute;
            inset: 0;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .video-container video.visible { display: block; }
        .video-tile[data-is-local="true"][data-stream-type="camera"] .video-container video {
            transform: scaleX(-1);
        }
        .video-container video::-webkit-media-controls { display: none !important; }
        .video-container video::-webkit-media-controls-enclosure { display: none !important; }

        .video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--soft);
            color: var(--muted);
        }
        .video-placeholder.hidden { display: none !important; }
        .video-placeholder .initials {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accentSoft);
            border: 2px solid var(--accentBorder);
            color: var(--accent);
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .member-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(transparent, rgba(0,0,0,.5));
        }
        .member-name {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,.4);
        }
        .member-indicators {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .status-badge {
            display: none;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--liveBg);
            color: var(--liveText);
            border: 1px solid var(--liveBorder);
        }
        .status-badge.active { display: inline-block; }

        .indicator {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .indicator svg { width: 14px; height: 14px; }
        .indicator.on {
            background: rgba(110,98,130,.7);
            color: #fff;
        }
        .indicator.off {
            background: rgba(185,28,28,.7);
            color: #fff;
        }

        /* Controls Bar */
        .controls-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: var(--card);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .ctrl-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--soft);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }
        .ctrl-btn:hover { border-color: var(--accent); }
        .ctrl-btn.active { background: var(--accentSoft); border-color: var(--accent); color: var(--accent); }
        .ctrl-btn.danger {
            background: var(--dangerBg);
            border-color: var(--dangerBorder);
            color: var(--dangerText);
            margin-left: 16px;
        }
        .ctrl-btn.danger:hover { background: var(--dangerBorder); color: #fff; }
        .ctrl-btn svg { width: 20px; height: 20px; }

        /* Tile sizing by count */
        .camera-1 .video-tile { width: min(100%, calc((100vh - 220px) * 16 / 9)); }
        .camera-2 .video-tile { width: calc(50% - 5px); max-width: 480px; }
        .camera-3 .video-tile { width: calc(33.33% - 7px); max-width: 360px; }
        .camera-4 .video-tile { width: calc(50% - 5px); max-width: 420px; }
        .camera-5 .video-tile, .camera-6 .video-tile { width: calc(33.33% - 7px); max-width: 340px; }
        .camera-7 .video-tile, .camera-8 .video-tile { width: calc(25% - 8px); max-width: 280px; }

        /* Kicked Modal */
        #kickedOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        #kickedOverlay.visible { display: flex; }
        .kicked-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px 24px 20px;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,.18);
            text-align: center;
        }
        .kicked-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
        }
        .kicked-card p {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 24px;
            white-space: pre-line;
        }

        /* Mobile */
        @media (max-width: 640px) {
            #cameraGrid { flex-direction: row; flex-wrap: wrap; }
            .camera-2 .video-tile,
            .camera-3 .video-tile { width: 100%; max-width: none; }
            .camera-4 .video-tile,
            .camera-5 .video-tile,
            .camera-6 .video-tile,
            .camera-7 .video-tile,
            .camera-8 .video-tile { width: calc(50% - 5px); max-width: none; }
            .preview-container { width: 90% !important; }
            #screenshareGrid { flex-wrap: wrap; }
            #screenshareGrid .video-tile { flex: 1 1 100%; }
            .ctrl-btn { width: 48px; height: 48px; }
            .controls-bar { gap: 8px; padding: 10px 12px; }
        }

        /* Spotlight/Fullscreen Mode */
        .video-tile .spotlight-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: rgba(0,0,0,0.5);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 5;
        }
        .video-tile:hover .spotlight-btn { opacity: 1; }
        @media (pointer: coarse) { .video-tile .spotlight-btn { opacity: 0.7; } }
        .spotlight-btn svg { width: 16px; height: 16px; }

        .video-tile.spotlighted {
            position: fixed;
            inset: 0;
            z-index: 999;
            border-radius: 0;
            border: none;
            width: 100% !important;
            max-width: none !important;
        }
        .video-tile.spotlighted .aspect-spacer { display: none; }
        .video-tile.spotlighted .video-container { position: absolute; inset: 0; }
        .video-tile.spotlighted .video-container video { object-fit: contain; background: #000; }

        /* Drag-to-reorder */
        .video-tile.dragging { opacity: 0.5; }
        .video-tile.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accentBorder); }

        /* Resize handle */
        .video-tile .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 16px;
            height: 16px;
            cursor: nwse-resize;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .video-tile:hover .resize-handle { opacity: 0.6; }
        .resize-handle::after {
            content: '';
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 8px;
            height: 8px;
            border-right: 2px solid rgba(255,255,255,0.6);
            border-bottom: 2px solid rgba(255,255,255,0.6);
        }

        /* Presentation mode */
        .live-content.presentation-mode {
            flex-direction: column;
            align-items: stretch;
        }
        .presentation-mode #screenshareGrid {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .presentation-mode #screenshareGrid .video-tile {
            flex: 1 1 100%;
            max-width: 100%;
            max-height: calc(100vh - 200px);
        }
        .presentation-mode #cameraGrid {
            flex: 0 0 auto;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 8px;
            justify-content: flex-start;
            padding: 8px 0;
        }
        .presentation-mode #cameraGrid .video-tile {
            flex: 0 0 180px;
            width: 180px !important;
            max-width: 180px !important;
        }
        @media (max-width: 640px) {
            .presentation-mode #cameraGrid .video-tile {
                flex: 0 0 140px;
                width: 140px !important;
                max-width: 140px !important;
            }
        }

        /* Toast Notifications */
        #toastContainer {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 13px;
            box-shadow: 0 4px 16px rgba(0,0,0,.15);
            pointer-events: auto;
            animation: toastIn 0.3s ease-out;
            max-width: 360px;
            text-align: center;
        }
        .toast.error { border-color: var(--dangerBorder); color: var(--dangerText); }
        .toast.fade-out { animation: toastOut 0.3s ease-in forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { transition-duration: 0s !important; animation-duration: 0s !important; }
        }
    </style>
</head>
<body>

<!-- Toast Container -->
<div id="toastContainer"></div>

<!-- Theme Toggle -->
<button id="themeToggle" title="Toggle theme">
    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<!-- Topbar -->
<div class="topbar" id="topbar">
    <div class="topbar-left">TinyRoom</div>
    <div class="topbar-right">
        <span class="room-code-pill" id="topbarRoomCode"></span>
        <button class="topbar-btn" id="copyCodeBtn" title="Copy room code">
            Code
            <span class="copied-tooltip" id="copyCodeTooltip">Copied!</span>
        </button>
        <button class="topbar-btn" id="copyLinkBtn" title="Copy invite link">
            Link
            <span class="copied-tooltip" id="copyLinkTooltip">Copied!</span>
        </button>
    </div>
</div>

<!-- Entry Screen -->
<div id="entryScreen">
    <div class="entry-card">
        <label for="nameInput">Your name</label>
        <input type="text" id="nameInput" placeholder="Enter your name" maxlength="24" autofocus>
        <div class="name-hint" id="nameHint">Please enter your name first</div>
    </div>
    <div class="entry-card">
        <button class="btn btn-primary btn-full" id="startBtn">+ Start a Room</button>
        <div class="or-divider">OR</div>
        <label style="font-size:13px; font-weight:600; color:var(--muted); margin-bottom:8px;">Join with room code</label>
        <div class="join-row">
            <input type="text" id="codeInput" placeholder="Room code">
            <button class="btn btn-secondary" id="joinBtn">Join</button>
        </div>
    </div>
</div>

<!-- Pre-Live Screen -->
<div id="preLiveScreen">
    <div class="prelive-wrapper">
        <div class="preview-container" id="previewContainer"></div>
        <div class="prelive-controls">
            <button class="ctrl-btn" id="preToggleCam" title="Toggle camera">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            </button>
            <button class="ctrl-btn" id="preToggleMic" title="Toggle microphone">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
        </div>
        <div class="prelive-actions">

<script src="https://makedo.com/sdk/makedo-vibelive.min.js"></script>
<script>
(function() {
    'use strict';

    // ── Init ──
    VibeLive.init({ projectId: 'vlp_1eZR3nR43ETF', projectKey: 'vlk_HrA3D0oiW6cTlrPsD0NIGmsy' });

    // ── DOM refs ──
    const $ = (id) => document.getElementById(id);
    const entryScreen = $('entryScreen');
    const preLiveScreen = $('preLiveScreen');
    const liveScreen = $('liveScreen');
    const topbar = $('topbar');
    const nameInput = $('nameInput');
    const codeInput = $('codeInput');
    const nameHint = $('nameHint');
    const startBtn = $('startBtn');
    const joinBtn = $('joinBtn');
    const goLiveBtn = $('goLiveBtn');
    const backBtn = $('backBtn');
    const leaveBtn = $('leaveBtn');
    const topbarRoomCode = $('topbarRoomCode');
    const cameraGrid = $('cameraGrid');
    const screenshareGrid = $('screenshareGrid');
    const previewContainer = $('previewContainer');

    let nameHintTimer = null;
    let localName = '';
    const liveContent = document.querySelector('.live-content');

    // ── SVG Icons ──
    const ICONS = {
        camOn: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>',
        camOff: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>',
        micOn: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>',
        micOff: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.13 1.5-.35 2.18"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>'
    };

    const ICONS_EXPAND = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
    const ICONS_SHRINK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';

    // ── Toast Notifications ──
    function showToast(message, type = 'info', duration = 3500) {
        const container = $('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast${type === 'error' ? ' error' : ''}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.classList.add('fade-out');
            setTimeout(() => toast.remove(), 300);
        }, duration);
    }

    // Map SDK error codes to user-friendly messages
    function friendlyError(context, error) {
        const msg = error?.message || '';
        const code = error?.code || '';
        if (code === 'ROOM_NOT_FOUND' || msg.includes('not found')) return 'Room not found. Please check the code and try again.';
        if (code === 'ROOM_FULL' || msg.includes('full')) return 'This room is full (max 8 participants).';
        if (msg.includes('permission') || msg.includes('Permission') || msg.includes('NotAllowed')) return 'Camera/mic permission denied. Please allow access in your browser settings.';
        if (msg.includes('NotFound') || msg.includes('no device')) return 'No camera or microphone found on this device.';
        if (msg.includes('network') || msg.includes('Network') || msg.includes('fetch')) return 'Network error. Please check your connection and try again.';
        if (context === 'screenshare') return 'Could not start screen sharing.';
        return `Something went wrong. Please try again.`;
    }

    // ── Spotlight ──
    function toggleSpotlight(tile) {
        const btn = tile.querySelector('.spotlight-btn');
        if (tile.classList.contains('spotlighted')) {
            tile.classList.remove('spotlighted');
            if (btn) btn.innerHTML = ICONS_EXPAND;
            // Return tile to its grid
            const streamType = tile.dataset.streamType;
            const grid = streamType === 'screenshare' ? screenshareGrid : cameraGrid;
            grid.appendChild(tile);
        } else {
            // Remove any existing spotlight
            document.querySelectorAll('.video-tile.spotlighted').forEach(t => toggleSpotlight(t));
            tile.classList.add('spotlighted');
            if (btn) btn.innerHTML = ICONS_SHRINK;
            document.body.appendChild(tile);
        }
    }

    // ── Drag to Reorder (camera grid only) ──
    let dragSrc = null;

    function enableDrag(tile) {
        tile.setAttribute('draggable', 'true');
        tile.addEventListener('dragstart', (e) => {
            if (tile.dataset.streamType !== 'camera') return;
            dragSrc = tile;
            tile.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });
        tile.addEventListener('dragend', () => {
            tile.classList.remove('dragging');
            cameraGrid.querySelectorAll('.video-tile').forEach(t => t.classList.remove('drag-over'));
            dragSrc = null;
        });
        tile.addEventListener('dragover', (e) => {
            if (!dragSrc || tile === dragSrc || tile.dataset.streamType !== 'camera') return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            tile.classList.add('drag-over');
        });
        tile.addEventListener('dragleave', () => tile.classList.remove('drag-over'));
        tile.addEventListener('drop', (e) => {
            e.preventDefault();
            tile.classList.remove('drag-over');
            if (!dragSrc || tile === dragSrc || tile.dataset.streamType !== 'camera') return;
            const tiles = [...cameraGrid.children];
            const fromIdx = tiles.indexOf(dragSrc);
            const toIdx = tiles.indexOf(tile);
            if (fromIdx < toIdx) {
                cameraGrid.insertBefore(dragSrc, tile.nextSibling);
            } else {
                cameraGrid.insertBefore(dragSrc, tile);
            }
        });

        // Touch drag support
        let touchClone = null;
        let touchStartX, touchStartY;
        tile.addEventListener('touchstart', (e) => {
            if (tile.dataset.streamType !== 'camera') return;
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            dragSrc = tile;
        }, { passive: true });
        tile.addEventListener('touchmove', (e) => {
            if (!dragSrc || dragSrc !== tile) return;
            const touch = e.touches[0];
            const dx = Math.abs(touch.clientX - touchStartX);
            const dy = Math.abs(touch.clientY - touchStartY);
            if (dx > 10 || dy > 10) {
                tile.classList.add('dragging');
            }
        }, { passive: true });
        tile.addEventListener('touchend', (e) => {
            if (!dragSrc || dragSrc !== tile) { dragSrc = null; return; }
            tile.classList.remove('dragging');
            if (!tile.classList.contains('dragging')) {
                const touch = e.changedTouches[0];
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                const dropTile = target?.closest('.video-tile');
                if (dropTile && dropTile !== tile && dropTile.dataset.streamType === 'camera' && cameraGrid.contains(dropTile)) {
                    const tiles = [...cameraGrid.children];
                    const fromIdx = tiles.indexOf(tile);
                    const toIdx = tiles.indexOf(dropTile);
                    if (fromIdx < toIdx) {
                        cameraGrid.insertBefore(tile, dropTile.nextSibling);
                    } else {
                        cameraGrid.insertBefore(tile, dropTile);
                    }
                }
            }
            dragSrc = null;
        });
    }

    // ── Resize Tiles ──
    function enableResize(tile) {
        const handle = document.createElement('div');
        handle.className = 'resize-handle';
        tile.appendChild(handle);

        let startX, startY, startW, startH;
        function onMouseDown(e) {
            e.preventDefault();
            e.stopPropagation();
            startX = e.clientX;
            startY = e.clientY;
            startW = tile.offsetWidth;
            startH = tile.offsetHeight;
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }
        function onMouseMove(e) {
            const w = Math.max(160, startW + (e.clientX - startX));
            tile.style.width = w + 'px';
            tile.style.maxWidth = w + 'px';
            tile.style.flex = '0 0 ' + w + 'px';
        }
        function onMouseUp() {
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        }
        handle.addEventListener('mousedown', onMouseDown);

        // Touch resize
        handle.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            startW = tile.offsetWidth;
            startH = tile.offsetHeight;
            function onTouchMove(e2) {
                const t = e2.touches[0];
                const w = Math.max(160, startW + (t.clientX - startX));
                tile.style.width = w + 'px';
                tile.style.maxWidth = w + 'px';
                tile.style.flex = '0 0 ' + w + 'px';
            }
            function onTouchEnd() {
                document.removeEventListener('touchmove', onTouchMove);
                document.removeEventListener('touchend', onTouchEnd);
            }
            document.addEventListener('touchmove', onTouchMove, { passive: true });
            document.addEventListener('touchend', onTouchEnd);
        }, { passive: false });
    }

    // ── Presentation Mode ──
    function updatePresentationMode() {
        const hasScreenshare = screenshareGrid.querySelectorAll('.video-tile:not([style*="display: none"])').length > 0;
        liveContent.classList.toggle('presentation-mode', hasScreenshare);
    }

    // ── Theme ──
    function initTheme() {
        const saved = localStorage.getItem('tinyroom-theme');
        if (saved) {
            setTheme(saved);
        } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
            setTheme('light');
        }
    }

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('tinyroom-theme', theme);
        const sunIcon = document.querySelector('#themeToggle .sun-icon');
        const moonIcon = document.querySelector('#themeToggle .moon-icon');
        if (theme === 'dark') {
            sunIcon.style.display = 'block';
            moonIcon.style.display = 'none';
        } else {
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
        }
    }

    $('themeToggle').addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        setTheme(current === 'dark' ? 'light' : 'dark');
    });

    initTheme();

    // ── Spotlight: Escape to close ──
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.querySelectorAll('.video-tile.spotlighted').forEach(t => toggleSpotlight(t));
        }
    });

    // ── URL Deep Linking ──
    const urlParams = new URLSearchParams(window.location.search);
    const urlCode = urlParams.get('code');
    if (urlCode) {
        codeInput.value = urlCode;
        updateButtonPriority();
    }

    // ── Dynamic Button Priority ──
    codeInput.addEventListener('input', updateButtonPriority);

    function updateButtonPriority() {
        if (codeInput.value.trim()) {
            joinBtn.className = 'btn btn-primary';
            startBtn.className = 'btn btn-secondary btn-full';
        } else {
            startBtn.className = 'btn btn-primary btn-full';
            joinBtn.className = 'btn btn-secondary';
        }
    }

    // ── Name Validation ──
    nameInput.addEventListener('input', () => {
        nameHint.classList.remove('visible');
        if (nameHintTimer) { clearTimeout(nameHintTimer); nameHintTimer = null; }
    });

    function validateName() {
        if (!nameInput.value.trim()) {
            nameHint.classList.add('visible');
            nameInput.focus();
            if (nameHintTimer) clearTimeout(nameHintTimer);
            nameHintTimer = setTimeout(() => nameHint.classList.remove('visible'), 3000);
            return false;
        }
        return true;
    }

    // ── Screen Navigation ──
    function showScreen(screen) {
        entryScreen.style.display = 'none';
        preLiveScreen.style.display = 'none';
        liveScreen.style.display = 'none';
        topbar.classList.remove('visible');

        if (screen === 'entry') {
            entryScreen.style.display = 'flex';
        } else if (screen === 'preLive') {
            preLiveScreen.style.display = 'flex';
            topbar.classList.add('visible');
        } else if (screen === 'live') {
            liveScreen.style.display = 'flex';
            topbar.classList.add('visible');
        }
    }

    // ── Copy Helpers ──
    function flashTooltip(tooltipEl) {
        tooltipEl.classList.add('show');
        setTimeout(() => tooltipEl.classList.remove('show'), 1500);
    }

    $('copyCodeBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(VibeLive.roomCode || '');
        flashTooltip($('copyCodeTooltip'));
    });

    $('copyLinkBtn').addEventListener('click', () => {
        const url = new URL(window.location.href);
        url.searchParams.set('code', VibeLive.roomCode || '');
        navigator.clipboard.writeText(url.toString());
        flashTooltip($('copyLinkTooltip'));
    });

    // ── Initials Helper ──
    function getInitials(name) {
        if (!name || !name.trim()) return '?';
        const parts = name.trim().split(/\s+/);
        if (parts.length === 1) return parts[0][0].toUpperCase();
        return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }

    // ── Create Video Tile ──
    function createTile(memberId, name, streamType, isLocal) {
        const tileId = `tile-${memberId}-${streamType}`;
        if (document.getElementById(tileId)) return document.getElementById(tileId);

        const tile = document.createElement('div');
        tile.className = 'video-tile';
        tile.id = tileId;
        tile.dataset.memberId = memberId;
        tile.dataset.streamType = streamType;
        tile.dataset.isLocal = isLocal ? 'true' : 'false';
        tile.dataset.streamType = streamType;

        // Spotlight button
        const spotlightBtn = document.createElement('button');
        spotlightBtn.className = 'spotlight-btn';
        spotlightBtn.title = 'Toggle fullscreen';
        spotlightBtn.innerHTML = ICONS_EXPAND;
        spotlightBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleSpotlight(tile); });
        tile.appendChild(spotlightBtn);

        const spacer = document.createElement('div');
        spacer.className = 'aspect-spacer';
        tile.appendChild(spacer);

        // Video container
        const videoContainer = document.createElement('div');
        videoContainer.className = 'video-container';

        const placeholder = document.createElement('div');
        placeholder.className = 'video-placeholder';
        if (streamType === 'camera') {
            const initialsEl = document.createElement('div');
            initialsEl.className = 'initials';
            initialsEl.textContent = getInitials(name);
            placeholder.appendChild(initialsEl);
        } else {
            const span = document.createElement('span');
            span.textContent = isLocal ? 'Your Screen' : `${name}'s Screen`;
            placeholder.appendChild(span);
        }

        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = (isLocal || streamType === 'screenshare');

        videoContainer.appendChild(placeholder);
        videoContainer.appendChild(video);
        tile.appendChild(videoContainer);

        // Info bar
        const memberInfo = document.createElement('div');
        memberInfo.className = 'member-info';

        const label = streamType === 'screenshare'
            ? (isLocal ? 'Your Screen' : `${name}'s Screen`)
            : (isLocal ? `${name} (You)` : name);

        if (streamType === 'camera') {
            memberInfo.innerHTML = `
                <span class="member-name">${label}</span>
                <div class="member-indicators">
                    <span class="status-badge">LIVE</span>
                    <span class="indicator cam-video off" title="Camera">${ICONS.camOff}</span>
                    <span class="indicator cam-audio off" title="Microphone">${ICONS.micOff}</span>
                </div>
            `;
        } else {
            memberInfo.innerHTML = `
                <span class="member-name">${label}</span>
                <div class="member-indicators">
                    <span class="status-badge active">LIVE</span>
                </div>
            `;
        }

        tile.appendChild(memberInfo);

        // Screenshare tiles start hidden
        if (streamType === 'screenshare') tile.style.display = 'none';

        const targetGrid = streamType === 'screenshare' ? screenshareGrid : cameraGrid;
        targetGrid.appendChild(tile);

        // registerTile: auto-finds <video> and registers it.
        // SDK auto-removes registered tiles on member exit, screenshare end, room exit, or kick.
        VibeLive.registerTile(memberId, streamType, tile);

        // Enable drag and resize for camera tiles
        if (streamType === 'camera') {
            enableDrag(tile);
            enableResize(tile);
        }

        updateGridLayout();
        return tile;
    }

    // ── Grid Layout ──
    function updateGridLayout() {
        const visibleTiles = cameraGrid.querySelectorAll('.video-tile:not([style*="display: none"])');
        const count = visibleTiles.length;
        cameraGrid.className = cameraGrid.className.replace(/camera-\d+/g, '').trim();
        if (count > 0 && count <= 8) {
            cameraGrid.classList.add(`camera-${count}`);
        } else if (count > 8) {
            cameraGrid.classList.add('camera-8');
        }
        updatePresentationMode();
    }

    // ── Update tile indicators + visibility via memberStateChange state ──
    function updateTileFromState(memberId, state) {
        // state = { status, live, video, audio, screenVideo }
        const camTileId = `tile-${memberId}-camera`;
        const camTile = document.getElementById(camTileId);

        if (camTile) {
            // LIVE badge
            const badge = camTile.querySelector('.status-badge');
            if (badge) badge.classList.toggle('active', state.live);

            // Camera indicator
            const camVideoInd = camTile.querySelector('.cam-video');
            if (camVideoInd) {
                const videoOn = state.video === 'ON';
                camVideoInd.className = `indicator cam-video ${videoOn ? 'on' : 'off'}`;
                camVideoInd.innerHTML = videoOn ? ICONS.camOn : ICONS.camOff;
            }

            // Audio indicator
            const camAudioInd = camTile.querySelector('.cam-audio');
            if (camAudioInd) {
                const audioOn = state.audio === 'ON';
                camAudioInd.className = `indicator cam-audio ${audioOn ? 'on' : 'off'}`;
                camAudioInd.innerHTML = audioOn ? ICONS.micOn : ICONS.micOff;
            }

            // Camera placeholder <-> video visibility
            const placeholder = camTile.querySelector('.video-placeholder');
            const video = camTile.querySelector('video');
            const videoOn = state.video === 'ON';
            if (placeholder) placeholder.classList.toggle('hidden', videoOn);
            if (video) video.classList.toggle('visible', videoOn);
        }

        // Screenshare tile show/hide
        const screenTile = document.getElementById(`tile-${memberId}-screenshare`);
        if (screenTile) {
            const screenOn = state.screenVideo !== 'OFF';
            screenTile.style.display = screenOn ? 'block' : 'none';
            const sp = screenTile.querySelector('.video-placeholder');
            const sv = screenTile.querySelector('video');
            if (sp) sp.classList.toggle('hidden', screenOn);
            if (sv) sv.classList.toggle('visible', screenOn);
        }

        updateGridLayout();
        updatePresentationMode();
    }

    // ── Update control button active states ──
    function updatePreLiveControls() {
        const s = VibeLive.mediaState;
        $('preToggleCam').classList.toggle('active', s.videoDetail === 'ON');
        $('preToggleMic').classList.toggle('active', s.audioDetail === 'ON');
    }

    function updateLiveControls() {
        const s = VibeLive.mediaState;
        const screen = VibeLive.screenState;
        $('liveToggleCam').classList.toggle('active', s.videoDetail === 'ON');
        $('liveToggleMic').classList.toggle('active', s.audioDetail === 'ON');
        $('liveToggleScreen').classList.toggle('active', screen.videoDetail === 'ON');
    }

    // ── Shared Teardown ──
    function tearDown() {
        VibeLive.exitRoom(); // SDK auto-removes all registered tiles
        cameraGrid.innerHTML = '';
        screenshareGrid.innerHTML = '';
        previewContainer.innerHTML = '';
        showScreen('entry');
        // Reset entry buttons
        startBtn.disabled = false;
        startBtn.textContent = '+ Start a Room';
        joinBtn.disabled = false;
        joinBtn.textContent = 'Join';
        updateButtonPriority();
    }

    // ── Kicked Modal ──
    function showKickedModal(message) {
        $('kickedMessage').textContent = message || 'You have been removed from the meeting.';
        $('kickedOverlay').classList.add('visible');
    }

    $('kickedOkBtn').addEventListener('click', () => {
        $('kickedOverlay').classList.remove('visible');
    });

    // ── Entry Actions ──
    startBtn.addEventListener('click', async () => {
        if (!validateName()) return;
        localName = nameInput.value.trim();

        startBtn.disabled = true;
        startBtn.innerHTML = '<span class="spinner"></span> Creating...';

        try {
            await VibeLive.signup(localName);
            const room = await VibeLive.createRoom(`${localName}'s Room`);
            await VibeLive.enterByRoomCode(room.room_code);
        } catch (e) {
            console.error('Start room error:', e);
            showToast(friendlyError('create', e), 'error');
            startBtn.disabled = false;
            startBtn.textContent = '+ Start a Room';
        }
    });

    joinBtn.addEventListener('click', async () => {
        if (!validateName()) return;
        const code = codeInput.value.trim();
        if (!code) { codeInput.focus(); return; }
        localName = nameInput.value.trim();

        joinBtn.disabled = true;
        joinBtn.innerHTML = '<span class="spinner"></span> Joining...';

        try {
            await VibeLive.signup(localName);
            await VibeLive.enterByRoomCode(code);
        } catch (e) {
            console.error('Join room error:', e);
            showToast(friendlyError('join', e), 'error');
            joinBtn.disabled = false;
            joinBtn.textContent = 'Join';
        }
    });

    // ── Pre-Live Controls ──
    $('preToggleCam').addEventListener('click', async () => {
        await VibeLive.setVideo(!VibeLive.mediaState.video);
        updatePreLiveControls();
    });

    $('preToggleMic').addEventListener('click', async () => {
        await VibeLive.setAudioMuted(!VibeLive.mediaState.audioMuted);
        updatePreLiveControls();
    });

    goLiveBtn.addEventListener('click', async () => {
        goLiveBtn.disabled = true;
        goLiveBtn.innerHTML = '<span class="spinner"></span> Connecting...';
        try {
            await VibeLive.startLive();
        } catch (e) {
            console.error('Go live error:', e);
            showToast(friendlyError('goLive', e), 'error');
            goLiveBtn.disabled = false;
            goLiveBtn.textContent = 'Go Live';
        }
    });

    backBtn.addEventListener('click', () => {
        tearDown();
    });

    // ── Live Controls ──
    $('liveToggleCam').addEventListener('click', async () => {
        await VibeLive.setVideo(!VibeLive.mediaState.video);
        updateLiveControls();
    });

    $('liveToggleMic').addEventListener('click', async () => {
        await VibeLive.setAudioMuted(!VibeLive.mediaState.audioMuted);
        updateLiveControls();
    });

    $('liveToggleScreen').addEventListener('click', async () => {
        const wantsToShare = !VibeLive.screenState.video;
        if (wantsToShare) {
            const activeScreenshares = screenshareGrid.querySelectorAll('.video-tile:not([style*="display: none"])').length;
            if (activeScreenshares >= 2) {
                showToast('Only 2 people can share screens at a time.', 'error');
                return;
            }
        }
        await VibeLive.setScreenshare(wantsToShare);
        updateLiveControls();
    });

    leaveBtn.addEventListener('click', () => {
        tearDown();
    });

    // ════════════════════════════════════════════
    // ── VibeLive Events ──
    // ════════════════════════════════════════════

    // REQUIRED: channelSelected -- set up local tiles, show controls
    VibeLive.on('channelSelected', async (channel) => {
        topbarRoomCode.textContent = VibeLive.roomCode;
        showScreen('preLive');

        // Element-First Rule: create both camera and screenshare tiles
        const members = await VibeLive.getMembers();
        const self = members.find(m => m.id === VibeLive.memberId);
        const selfName = self?.displayName || localName || 'You';

        createTile(VibeLive.memberId, selfName, 'camera', true);
        createTile(VibeLive.memberId, selfName, 'screenshare', true);

        // Move local camera tile to preview area for pre-live
        const localCamTile = document.getElementById(`tile-${VibeLive.memberId}-camera`);
        if (localCamTile) {
            previewContainer.appendChild(localCamTile);
        }

        // Start camera + mic for preview
        await VibeLive.setVideo(true);
        await VibeLive.setAudio(true);
        updatePreLiveControls();
    });

    // REQUIRED: memberStateChange -- unified state for ALL members
    VibeLive.on('memberStateChange', (memberId, state) => {
        // state = { status, live, video, audio, screenVideo }
        updateTileFromState(memberId, state);

        // Update control buttons if local
        if (memberId === VibeLive.memberId) {
            updatePreLiveControls();
            updateLiveControls();
        }
    });

    // REQUIRED: remoteStreamStart -- create remote tile via registerTile()
    VibeLive.on('remoteStreamStart', (memberId, streamType) => {
        const m = VibeLive.getMember(memberId);
        createTile(memberId, m?.displayName || 'Remote', streamType, false);
        // registerTile (inside createTile) handles video element registration.
        // memberStateChange handles indicators. Nothing else needed.
    });

    // RECOMMENDED: localJoined -- transition to live screen
    VibeLive.on('localJoined', () => {
        showScreen('live');

        // Move local tiles from preview to live grids
        const localCamTile = document.getElementById(`tile-${VibeLive.memberId}-camera`);
        if (localCamTile) cameraGrid.appendChild(localCamTile);

        const localScreenTile = document.getElementById(`tile-${VibeLive.memberId}-screenshare`);
        if (localScreenTile) screenshareGrid.appendChild(localScreenTile);

        updateGridLayout();
        updateLiveControls();

        // Reset go live button
        goLiveBtn.disabled = false;
        goLiveBtn.textContent = 'Go Live';
    });

    // RECOMMENDED: localLeft -- update button state
    VibeLive.on('localLeft', () => {
        updateGridLayout();
    });

    // RECOMMENDED: remoteJoined -- pre-create tile before stream arrives
    VibeLive.on('remoteJoined', (memberId) => {
        const m = VibeLive.getMember(memberId);
        createTile(memberId, m?.displayName || 'Remote', 'camera', false);
        updateGridLayout();
    });

    // RECOMMENDED: kicked -- show message, exitRoom, return to entry
    VibeLive.on('kicked', (message) => {
        VibeLive.exitRoom(); // SDK auto-removes all registered tiles
        cameraGrid.innerHTML = '';
        screenshareGrid.innerHTML = '';
        previewContainer.innerHTML = '';
        showScreen('entry');
        startBtn.disabled = false;
        startBtn.textContent = '+ Start a Room';
        joinBtn.disabled = false;
        joinBtn.textContent = 'Join';
        updateButtonPriority();
        showKickedModal(message || 'The meeting has ended.');
    });

    // RECOMMENDED: error
    VibeLive.on('error', (context, error) => {
        console.error(`[VibeLive ${context}]`, error.code || '', error.message);
        showToast(friendlyError(context, error), 'error');
    });

    // RECOMMENDED: warning
    VibeLive.on('warning', (context, message) => {
        console.warn(`[VibeLive ${context}]`, message);
    });

    // remoteStreamEnd: screenshare tiles auto-removed by SDK (registered tile).
    // remoteLeft: tiles auto-removed by SDK when member exits (registered tiles).

})();
</script>
</body>
</html>
